syntax = "proto3";

package common.v1;

option go_package = "github.com/gulmix/hermes/gen/go/common/v1;commonv1";

message PageRequest {
    int32 page = 1;
    int32 page_size = 2;
}

message PageResponse {
    int64 total = 1;
    int32 page = 2;
    int32 page_size = 3;
    bool has_next = 4;
}

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_NOT_FOUND = 1;
  ERROR_CODE_ALREADY_EXISTS = 2;
  ERROR_CODE_INVALID_ARGUMENT = 3;
  ERROR_CODE_PERMISSION_DENIED = 4;
  ERROR_CODE_INTERNAL = 5;
}

message AppError {
  ErrorCode code = 1;
  string message = 2;
  string field = 3;
}